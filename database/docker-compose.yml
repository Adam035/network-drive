version: '3.8'

services:
  postgres:
    image: postgres:18-alpine
    container_name: network-drive-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: network_drive_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - network-drive-network

volumes:
  postgres_data:

networks:
  network-drive-network:
    driver: bridge
